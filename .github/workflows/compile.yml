name: Compile firmware

# Sanity check: build a representative subset of flavors against both
# Teensy/ChibiOS and SAMD/FreeRTOS targets so RTOS-abstraction breakage gets
# caught before it lands.

on:
  push:
    branches: [master, main]
    paths:
      - "Firmware/**"
      - "platformio.ini"
      - ".github/workflows/compile.yml"
  pull_request:
    paths:
      - "Firmware/**"
      - "platformio.ini"
      - ".github/workflows/compile.yml"
  workflow_dispatch:

jobs:
  pio-compile:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env:
          - ErisServo        # Teensy/ChibiOS — verified reference
          - ErisMPU          # SAMD21/FreeRTOS — verified reference
          - BareMinimal      # Teensy template
          - ErisFreeRTOSBase # FreeRTOS baseline
          - Eris             # Base flavor

    steps:
      - name: Checkout Eris
        uses: actions/checkout@v4
        with:
          path: Eris

      - name: Checkout eriscommon (sibling library)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ArduinoLibraries
          path: ArduinoLibraries
          # If the ArduinoLibraries repo is private or named differently, edit
          # this step or copy eriscommon into the Eris repo before CI runs.
        continue-on-error: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build ${{ matrix.env }}
        working-directory: Eris
        run: pio run -e ${{ matrix.env }}

  python-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install eris driver
        working-directory: drivers/python
        run: pip install -e .

      - name: Smoke import
        run: python -c "from eris.eris import Eris; print('eris driver import OK')"
