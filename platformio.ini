; PlatformIO configuration for the Eris DAQ/Streaming Framework
; ==============================================================
; The src_dir resolves from the env name, so `pio run -e <Flavor>` builds
; Firmware/Flavors/<Flavor>. Add new envs below to enable more flavors.
;
; Examples:
;   pio run -e ErisServo                     # build ErisServo
;   pio run -e ErisMPU -t upload             # build + upload ErisMPU
;   pio device monitor -e ErisServo          # serial monitor @ 115200
;
; The eriscommon Arduino library is expected at ../ArduinoLibraries/eriscommon
; relative to this repo (or copy/symlink it into ~/Documents/Arduino/libraries).

[platformio]
src_dir = Firmware/Flavors/${PIOENV}
default_envs = ErisServo

; ---------------------------------------------------------------
; Common bases
; ---------------------------------------------------------------

[teensy_base]
platform = teensy
framework = arduino
board = teensy36
monitor_speed = 115200
lib_extra_dirs =
    ../ArduinoLibraries
lib_deps =
    kroimon/SerialCommand@^1.0.0
    bakercp/PacketSerial@^1.4.0
    greiman/ChRt@^1.2.1
build_flags =
    -Wall
    -Wno-unused-variable

[samd_freertos_base]
platform = atmelsam
framework = arduino
board = seeed_xiao
monitor_speed = 115200
lib_extra_dirs =
    ../ArduinoLibraries
lib_deps =
    kroimon/SerialCommand@^1.0.0
    bakercp/PacketSerial@^1.4.0
    seeed-studio/Seeed Arduino FreeRTOS@^1.0.0
build_flags =
    -Wall
    -Wno-unused-variable
    -DERIS_USE_FREERTOS

; ---------------------------------------------------------------
; Verified flavors
; ---------------------------------------------------------------

[env:ErisServo]
extends = teensy_base
; Servo.h is bundled with the Arduino/Teensy core — no external lib needed.

[env:ErisMPU]
extends = samd_freertos_base
lib_deps =
    ${samd_freertos_base.lib_deps}
    bolderflight/Bolder Flight Systems MPU9250@^1.0.2

[env:ErisADS1299]
extends = teensy_base
; Note: ADS1299, FeatureExtractor, Filters live outside Library Manager;
; install via lib_extra_dirs or copy to your Arduino libraries folder.

[env:Eris]
extends = teensy_base

[env:BareMinimal]
extends = teensy_base

[env:ErisServoHand]
extends = samd_freertos_base
lib_deps =
    ${samd_freertos_base.lib_deps}
    adafruit/Adafruit PWM Servo Driver Library@^2.4.0

[env:ErisFreeRTOSBase]
extends = samd_freertos_base

