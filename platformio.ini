; PlatformIO configuration for Eris DAQ/Streaming Framework
; =========================================================
; Proof of concept with the base Eris flavor.
;
; Quick start:
;   pio run                   # build
;   pio run -t upload         # build + upload
;   pio device monitor        # serial monitor @ 115200

[platformio]
; Source directory points to the base Eris flavor
; To build a different flavor, change this path.
src_dir = Firmware/Flavors/Eris

; --- Shared settings ---
[env:eris]
platform = teensy
framework = arduino
board = teensy36

; Serial monitor at console baud
monitor_speed = 115200

; Local libraries (eriscommon + FastDualBuffer live in the repo root)
lib_extra_dirs =
    .

; External library dependencies
lib_deps =
    kroimon/SerialCommand@^1.0.0
    bakercp/PacketSerial@^1.4.0
    greiman/ChRt@^1.2.1

; Compiler warnings
build_flags =
    -Wall
    -Wno-unused-variable
